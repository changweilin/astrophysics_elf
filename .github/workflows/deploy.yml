name: Deploy to GitHub Pages

# The lab is a no-build static site: index.html transpiles the .jsx files
# in-browser via @babel/standalone, and React/Babel load from a CDN. So we just
# publish the source tree (minus tooling dirs) straight to GitHub Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage static site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.claude' \
            --exclude='.codex' \
            --exclude='_site' \
            ./ _site/
          # Skip Jekyll so files/dirs are served verbatim (no underscore munging).
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
