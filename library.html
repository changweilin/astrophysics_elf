<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Black Hole Lab — Library · 黑洞實驗室 圖書館</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="/logos/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/logos/favicon-16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/logos/apple-touch-icon.png" />
<meta name="theme-color" content="#0b0d12" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=EB+Garamond:wght@500;600&family=Noto+Serif+TC:wght@500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="library.css" />
<link rel="stylesheet" href="page-nav.css" />
</head>
<body>
<header class="lp-top">
  <div class="kn-brand">
    <img src="/logos/icon-192.png" alt="" width="24" height="24" />
    <span class="kn-brand-name"><strong>ASTRO ELF</strong><span class="kn-brand-suffix">Black Hole Lab</span></span>
  </div>
  <div class="spacer"></div>
  <div class="lp-viewtoggle" id="lp-viewtoggle" role="tablist" aria-label="library view">
    <button id="lp-view-course" role="tab" aria-selected="true">Course</button>
    <button id="lp-view-graph" role="tab" aria-selected="false">Graph</button>
  </div>
  <nav class="kn-pagenav" aria-label="頁面導覽">
    <a class="kn-navbtn" href="index.html" title="實驗室 · Lab" aria-label="實驗室">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.5 3h5"/><path d="M10 3v5.3L5.4 18a1.6 1.6 0 0 0 1.45 2.3h10.3A1.6 1.6 0 0 0 18.6 18L14 8.3V3"/><path d="M7.6 14.5h8.8"/></svg>
    </a>
    <a class="kn-navbtn" href="scientists.html" title="科學家 · Talk with Scientists" aria-label="科學家">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="3.3"/><path d="M5.6 20a6.4 6.4 0 0 1 12.8 0"/></svg>
    </a>
  </nav>
  <select class="kn-langsel" id="lp-lang" aria-label="language"></select>
</header>

<div class="lp-shell">
  <main class="lp-main" id="lp-main">
    <div class="lp-loading">loading library…</div>
  </main>
  <nav class="lp-toc" aria-label="contents">
    <p class="toc-title">Contents · 索引</p>
    <ol id="lp-toc-list"></ol>
  </nav>
</div>

<!-- Content data first, then the renderer. All plain JS (no Babel).
     kb-config + kg-view power the read-only knowledge-graph mode;
     library-terms maps the course's technical terms onto graph entities;
     library-asks names the scientist who closes each chapter;
     demo-presets feeds the per-chapter mini-game launch buttons. -->
<script src="library-content.js"></script>
<script src="library-terms.js"></script>
<script src="library-asks.js"></script>
<script src="kb-config.js"></script>
<script src="kg-view.js"></script>
<script src="demo-presets.js"></script>
<script src="library.js"></script>
</body>
</html>
