<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Astro ELF · Black Hole Lab</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<!-- Favicon / app icons (black-hole logo) -->
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="/logos/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/logos/favicon-16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/logos/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
<meta name="theme-color" content="#0b0d12" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Responsive stylesheet: desktop -> styles.css, mobile -> mobile-styles.css.
     Only one is ever active, so their conflicting html/body/#root rules never clash. -->
<link rel="stylesheet" id="mode-css" />
<style>
  /* Full-bleed root in both layouts. mobile-styles.css centres #root with
     padding for the iOS-bezel preview; the unified page renders the mobile UI
     edge-to-edge, so neutralise that here (later rule wins the cascade). */
  #root { width: 100%; height: 100%; padding: 0; display: block; }
</style>
<script>
  // Decide layout from screen width + pointer type. Shared by the initial
  // synchronous stylesheet pick below and the React root's resize handler.
  window.__knIsMobile = function () {
    var w = window.innerWidth || document.documentElement.clientWidth || 0;
    var coarse = !!(window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
    return w < 900 || (coarse && w < 1200);
  };
  // Pick the stylesheet before first paint so the wrong layout never flashes.
  (function () {
    var mobile = window.__knIsMobile();
    document.getElementById('mode-css').href = mobile ? 'mobile-styles.css' : 'styles.css';
    document.documentElement.dataset.mode = mobile ? 'mobile' : 'desktop';
  })();
</script>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Multilingual layer (defines window.tr / window.trp / window.KNi18n) — must
     load first; the dictionary loads right after so KN_L10N exists before use. -->
<script src="i18n.js"></script>
<script src="i18n-dict.js"></script>

<!-- Shared simulation engine -->
<script src="physics.js"></script>
<script src="sim.js"></script>
<script src="disc.js"></script>
<script type="module" src="full-physics-bridge.mjs"></script>

<!-- Desktop UI (defines window.App) -->
<script type="text/babel" src="panel-left.jsx"></script>
<script type="text/babel" src="panel-right.jsx"></script>
<script type="text/babel" src="panel-bottom.jsx"></script>
<script type="text/babel" src="tidal-scope.jsx"></script>
<script type="text/babel" src="mhd-monitor.jsx"></script>
<script type="text/babel" src="field-profile.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<!-- Mobile UI (defines window.MobileApp) -->
<script type="text/babel" src="mobile-panels.jsx"></script>
<script type="text/babel" src="mobile-app.jsx"></script>

<script type="text/babel">
  const { useState: useRootState, useEffect: useRootEffect, useLayoutEffect: useRootLayout } = React;

  // Renders the desktop App or the mobile MobileApp and switches live when the
  // viewport crosses the breakpoint (resize, rotate, dev-tools device toggle).
  // App owns SIM, MobileApp owns MSIM — each keeps its own world across toggles.
  function ResponsiveRoot() {
    const [mobile, setMobile] = useRootState(() => window.__knIsMobile());

    useRootEffect(() => {
      const onResize = () => setMobile(window.__knIsMobile());
      window.addEventListener('resize', onResize);
      window.addEventListener('orientationchange', onResize);
      return () => {
        window.removeEventListener('resize', onResize);
        window.removeEventListener('orientationchange', onResize);
      };
    }, []);

    // Swap the stylesheet before paint so the new layout never renders unstyled.
    useRootLayout(() => {
      const link = document.getElementById('mode-css');
      const href = mobile ? 'mobile-styles.css' : 'styles.css';
      if (link.getAttribute('href') !== href) link.setAttribute('href', href);
      document.documentElement.dataset.mode = mobile ? 'mobile' : 'desktop';
    }, [mobile]);

    return mobile ? <MobileApp /> : <App />;
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<ResponsiveRoot />);
</script>
</body>
</html>
